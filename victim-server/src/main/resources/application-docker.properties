server.port=8081
spring.application.name=victim-server

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# URL ?? ?-SOC Backend ???? ?-Docker Network
backend.url=${BACKEND_URL:http://backend:8080}

# Risk Scoring Configuration
risk.score.base=5
risk.score.rps.low.threshold=3
risk.score.rps.low.penalty=30
risk.score.rps.high.threshold=10
risk.score.rps.high.penalty=60
risk.score.payload.malicious.penalty=85
risk.score.bruteforce.unique.payloads=3
risk.score.bruteforce.penalty=40
