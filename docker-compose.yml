services:

  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:16-alpine
    container_name: fraud_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: fraud_db,victim_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - fraud_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===== SOC Backend (Port 8080) =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fraud_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fraud_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APPLICATION_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      APPLICATION_SECURITY_JWT_EXPIRATION: ${JWT_EXPIRATION}
      VICTIM_URL: http://victim-server:8081
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      TZ: Asia/Jerusalem
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraud_network

  # ===== Victim Server (Port 8081) =====
  victim-server:
    build:
      context: ./victim-server
      dockerfile: Dockerfile
    container_name: fraud_victim
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/victim_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      BACKEND_URL: http://backend:8080
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      TZ: Asia/Jerusalem
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraud_network

  # ===== React Frontend (Port 80) =====
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: fraud_client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - victim-server
    networks:
      - fraud_network

# ===== Volumes =====
volumes:
  postgres_data:

# ===== Networks =====
networks:
  fraud_network:
    driver: bridge
